<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | DoN Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700;800;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>

  <svg class="noise-overlay" xmlns="http://www.w3.org/2000/svg">
    <filter id="noise-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise-filter)"/>
  </svg>

  <header class="header scrolled" id="header">
    <div class="header-inner">
      <a href="index.html" class="logo-mark"><img src="images/logo.png" alt="DoN Lab" class="logo-img"></a>
      <nav class="nav">
        <a href="index.html" class="nav-link">ホーム</a>
        <a href="profile.html" class="nav-link">プロフィール</a>
        <a href="index.html#works" class="nav-link">実績</a>
        <a href="plan.html" class="nav-link">サービス</a>
        <a href="contact.html" class="nav-link nav-link--active">お問い合わせ</a>
      </nav>
      <div class="header-right">
        <div class="availability"><span class="avail-dot"></span><span class="avail-text">Available</span></div>
        <button class="hamburger" id="hamburger" aria-label="メニュー"><span></span><span></span></button>
      </div>
    </div>
  </header>

  <div class="mobile-nav" id="mobile-nav">
    <a href="index.html" class="mobile-link">ホーム</a>
    <a href="profile.html" class="mobile-link">プロフィール</a>
    <a href="index.html#works" class="mobile-link">実績</a>
    <a href="plan.html" class="mobile-link">サービス</a>
    <a href="contact.html" class="mobile-link">お問い合わせ</a>
  </div>

  <!-- PAGE HERO -->
  <section class="cf-hero">
    <div class="cf-hero-inner">
      <div class="section-eyebrow reveal-up">Contact</div>
      <h1 class="cf-hero-title reveal-up">お問い合わせ</h1>
      <p class="cf-hero-sub reveal-up">ご相談・お見積りは完全無料です。お気軽にご連絡ください。</p>
    </div>
  </section>

  <!-- FORM SECTION -->
  <section class="section cf-section">
    <div class="cf-container">

      <p class="cf-lead reveal-up">
        サロン・ネイル・美容室オーナーの方、Webサイトについてのご相談はこちらからどうぞ。<br>
        通常<span class="cf-accent">1〜2営業日以内</span>にご返信いたします。
      </p>

      <form class="cf-form reveal-up" action="#" method="post">

        <div class="cf-field">
          <label class="cf-label">お名前<span class="cf-required">必須</span></label>
          <input type="text" class="cf-input" placeholder="例）山田 花子" required>
        </div>

        <div class="cf-field">
          <label class="cf-label">メールアドレス<span class="cf-required">必須</span></label>
          <input type="email" class="cf-input" placeholder="例）example@email.com" required>
        </div>

        <div class="cf-field">
          <label class="cf-label">電話番号</label>
          <input type="tel" class="cf-input" placeholder="例）090-1234-5678">
        </div>

        <div class="cf-field">
          <label class="cf-label">サロン名・屋号</label>
          <input type="text" class="cf-input" placeholder="例）Nail Studio HANA">
        </div>

        <div class="cf-field">
          <label class="cf-label">ご希望の連絡方法<span class="cf-required">必須</span></label>
          <div class="cf-radio-group">
            <label class="cf-radio"><input type="radio" name="contact_method" value="mail" checked><span>メール</span></label>
            <label class="cf-radio"><input type="radio" name="contact_method" value="line"><span>LINE</span></label>
            <label class="cf-radio"><input type="radio" name="contact_method" value="both"><span>どちらでも可</span></label>
          </div>
        </div>

        <div class="cf-field">
          <label class="cf-label">お問い合わせ内容<span class="cf-required">必須</span></label>
          <textarea class="cf-textarea" rows="6" placeholder="ご相談内容・ご要望などをご記入ください。" required></textarea>
        </div>

        <div class="cf-privacy">
          <label class="cf-check">
            <input type="checkbox" required>
            <span><a href="#" class="cf-privacy-link">プライバシーポリシー</a>に同意する</span>
          </label>
        </div>

        <div class="cf-submit-wrap">
          <button type="submit" class="cf-submit">送信する →</button>
        </div>

      </form>

      <div class="cf-alt reveal-up">
        <p class="cf-alt-text">SNSやメールから直接連絡することもできます。</p>
        <div class="contact-btns">
          <a href="https://www.instagram.com/" target="_blank" rel="noopener" class="btn btn-instagram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            Instagram DM
          </a>
          <a href="mailto:your@email.com" class="btn btn-ghost">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg>
            メールで相談
          </a>
        </div>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-logo"><img src="images/logo.png" alt="DoN Lab" class="logo-img" style="height:32px"></p>
      <p class="footer-copy">&copy; 2026 DoN Lab. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script>
    document.body.classList.remove('loading');
    const obs = new IntersectionObserver((entries, o) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); o.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal-up').forEach(el => obs.observe(el));
    setTimeout(() => document.querySelectorAll('.cf-hero .reveal-up').forEach(el => el.classList.add('visible')), 100);
  </script>
</body>
</html>
